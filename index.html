function parlayOdds(legs){
  if(!legs.length) return "--";
  var d = legs.reduce(function(a,l){ return a*toDec(l.ml); }, 1);
  return d>=2 ? "+"+Math.round((d-1)*100) : "-"+Math.round(100/(d-1));
}
function parlayWin(legs,bet){
  var d = legs.reduce(function(a,l){ return a*toDec(l.ml); }, 1);
  return (bet*(d-1)).toFixed(2);
}
function calcOdds(t1id,t2id,type){
  var diff = STRENGTH[t2id]-STRENGTH[t1id];
  var ml1,ml2;
  if(diff>1.5){ml1=-130;ml2=100;}
  else if(diff>0.5){ml1=-120;ml2=100;}
  else if(diff>-0.5){ml1=-115;ml2=-105;}
  else if(diff>-1.5){ml1=100;ml2=-120;}
  else{ml1=100;ml2=-130;}
  var rr = type==="rr";
  return {ml1:ml1, ml2:ml2, spread:rr?0.5:1.5, ou:rr?1.5:3.5, sfav:diff>=0?1:2};
}

function getPL(name,gid){
  var p=PP[name]||PP.Jordan;
  var t=gid==="fin"?p.fin:p.pi;
  return {pts:t.pts,pO:{o:t.pO,u:t.pU}};

function resolveB(bet,gr,statMap){
  // Parlay: resolve each leg, win only if all win
  if(bet.isParlay && bet.legs && bet.legs.length){
    var allFinal = bet.legs.every(function(leg){
      var legRes = gr[leg.gid||leg.gameId];
      return legRes && legRes.final;
    });
    if(!allFinal) return "pending";
    var allWin = bet.legs.every(function(leg){
      var legId = leg.id;
      var legGameId = leg.gid || leg.gameId;
      var legRes = gr[legGameId];
      if(!legRes || !legRes.final) return false;
      // ML leg
      if(legId.slice(-4)==="_ml1") return legRes.s1 > legRes.s2;
      if(legId.slice(-4)==="_ml2") return legRes.s2 > legRes.s1;
      // Prop leg
      if(legId.indexOf("_prop_")>=0){
        var after = legId.split("_prop_")[1];
        var dir = after.slice(after.lastIndexOf("_")+1);
        var rest = after.slice(0,after.lastIndexOf("_"));
        var stat = rest.slice(rest.lastIndexOf("_")+1);
        var pname = rest.slice(0,rest.lastIndexOf("_"));
        var pst = (statMap && statMap[legGameId+"__"+pname]) || {pts:0};
        var line = getPL(pname,legGameId)[stat] || 0;
        if(dir==="over") return pst[stat]>line;
        if(dir==="under") return pst[stat]<line;
      }
      return false;
    });
    return allWin ? "win" : "loss";
  }
  // Straight bet
  var res = gr[bet.gameId];
  if(!res || !res.final) return "pending";
  var id = bet.betOptionId;
  if(!id) return bet.result;
  if(id.slice(-4)==="_ml1") return res.s1>res.s2?"win":"loss";
  if(id.slice(-4)==="_ml2") return res.s2>res.s1?"win":"loss";
  if(id.indexOf("_prop_")>=0){
    var after2 = id.split("_prop_")[1];
    var dir2 = after2.slice(after2.lastIndexOf("_")+1);
    var rest2 = after2.slice(0,after2.lastIndexOf("_"));
    var stat2 = rest2.slice(rest2.lastIndexOf("_")+1);
    var pname2 = rest2.slice(0,rest2.lastIndexOf("_"));
    var pst2 = (statMap && statMap[bet.gameId+"__"+pname2]) || {pts:0};
    var line2 = getPL(pname2, bet.gameId||"pi1")[stat2] || 0;
    if(dir2==="over") return pst2[stat2]>line2?"win":"loss";
    if(dir2==="under") return pst2[stat2]<line2?"win":"loss";
  }
  return bet.result;
}

  //
  function setDrawFb(v){ setDraw(v); fbSet("draw",v); }

  // Random draw - Seth only
  function doDraw(){

    // ids[0],ids[1] = play-in teams; ids[2]=bye1 (SF1), ids[3]=bye2 (SF2 t1), ids[4]=bye3 (SF2 t2)
    var d={pi1t1:ids[0],pi1t2:ids[1],s1:ids[2],s2:ids[3],s3:ids[4]};
    setDrawFb(d);
    setPi1Fb({t1:ids[0],t2:ids[1],s1:0,s2:0,w:null});
    setSf1Fb({t1:null,t2:ids[2],s1:0,s2:0,w:null});
    setSf2Fb({t1:ids[3],t2:ids[4],s1:0,s2:0,w:null});

  }

  function skKey(gid,p){ return gid+"__"+p; }
  function getSt(gid,p){ return pStats[skKey(gid,p)] || {pts:0}; }
  function gameMax(gid){ return GAME_CAP[gid]||7; }
  function adjSt(gid,teamId,p,d){

      if(curTeamPts>=cap){ var inOT=otherPts>=cap-1&&curTeamPts-otherPts<2; if(!inOT) return; }

      var k=skKey(gid,p); var c=prev[k]||{pts:0}; var next={pts:Math.max(0,(c.pts||0)+d)};

    if(gid==="sf1"||gid==="sf2"){

      setPStatsFb(function(prev){ var next=Object.assign({},prev); ALL_PLAYERS.forEach(function(p){ next[skKey("fin",p)]={pts:0}; }); return next; });
    }
  }
  function liveTP(gid,tid){
    if(!tid) return 0;

  }

  // Resolve bets on game state changes
  useEffect(function(){
    if(!bets.length) return;
    var gr={};
    ["pi1","sf1","sf2","fin"].forEach(function(gid){
      var m=getMatch(gid); if(!m||!m.t1||!m.t2) return;
      gr[gid]={s1:m.s1,s2:m.s2,final:!!m.w};
    });
    var resolved=bets.map(function(b){ return Object.assign({},b,{result:resolveB(b,gr,pStats)}); });

    ["pi1","sf1","sf2","fin"].forEach(function(gid){
      var m=getMatch(gid); if(!m||!m.t1||!m.t2) return;
      var s1=liveTP(gid,m.t1),s2=liveTP(gid,m.t2);
      if(s1!==m.s1||s2!==m.s2) setMatchFb(gid,function(mm){ return Object.assign({},mm,{s1:s1,s2:s2}); });
    });
  },[pStats,pi1.t1,pi1.t2,sf1.t1,sf1.t2,sf2.t1,sf2.t2,fin.t1,fin.t2]);

  // Auto-advance: PI1 winner -> SF1 t1
  useEffect(function(){
    if(!pi1.w) return;
    if(sf1.t1!==pi1.w) setSf1Fb(function(m){ return Object.assign({},m,{t1:pi1.w}); });
  },[pi1.w]);
  useEffect(function(){ if(sf1.w&&fin.t1!==sf1.w) setFinFb(function(m){ return Object.assign({},m,{t1:sf1.w}); }); },[sf1.w]);
  useEffect(function(){ if(sf2.w&&fin.t2!==sf2.w) setFinFb(function(m){ return Object.assign({},m,{t2:sf2.w}); }); },[sf2.w]);

  // Game lock logic
  function isGameLocked(gid){
    if(gid==="pi1") return !draw;
    if(gid==="sf1") return !pi1.w;
    if(gid==="sf2") return !sf1.w;
    if(gid==="fin") return !sf1.w||!sf2.w;
    return false;
  }
  function getPlayersInGame(gid){ var m=getMatch(gid); if(!m||!m.t1||!m.t2) return []; return getTeam(m.t1).players.concat(getTeam(m.t2).players); }
  function isGameFinalized(gid){ var m=getMatch(gid); return !!(m&&m.w); }
  function isGameStarted(gid){ if(isGameFinalized(gid)) return true; return getPlayersInGame(gid).some(function(p){ var s=pStats[skKey(gid,p)]; return s&&s.pts>0; }); }
  function isPlayerInGame(gid){ return getPlayersInGame(gid).indexOf(bettor)>=0; }

  var skGames=[
    {id:"pi1",label:"Play-In",    teams:pi1.t1&&pi1.t2?[pi1.t1,pi1.t2]:[],prereqLocked:!draw},
    {id:"sf1",label:"Semifinal 1",teams:sf1.t1&&sf1.t2?[sf1.t1,sf1.t2]:[],prereqLocked:isGameLocked("sf1")},
    {id:"sf2",label:"Semifinal 2",teams:sf2.t1&&sf2.t2?[sf2.t1,sf2.t2]:[],prereqLocked:isGameLocked("sf2")},
    {id:"fin",label:"Championship",teams:fin.t1&&fin.t2?[fin.t1,fin.t2]:[],prereqLocked:isGameLocked("fin")},
  ];

  var bGames=[
    {id:"pi1",full:"Play-In",    t1:pi1.t1,t2:pi1.t2,prereqLocked:!draw,playerLocked:draw?isPlayerInGame("pi1"):false},
    {id:"sf1",full:"Semifinal 1",t1:sf1.t1,t2:sf1.t2,prereqLocked:isGameLocked("sf1"),playerLocked:!isGameLocked("sf1")&&isPlayerInGame("sf1")},
    {id:"sf2",full:"Semifinal 2",t1:sf2.t1,t2:sf2.t2,prereqLocked:isGameLocked("sf2"),playerLocked:!isGameLocked("sf2")&&isPlayerInGame("sf2")},
    {id:"fin",full:"Championship",t1:fin.t1,t2:fin.t2,prereqLocked:isGameLocked("fin"),playerLocked:!isGameLocked("fin")&&isPlayerInGame("fin")},
  ];

  var selG=bGames.find(function(g){ return g.id===bGame; })||bGames[0];

  function hasLeg(id){ return slip.some(function(l){ return l.id===id; }); }
  var slipGid = slip.length>0 ? slip[0].gid : null;
  var selGid = (bGames.find(function(g){ return g.id===(bGame||(bGames[0]&&bGames[0].id)||""); })||{}).id;
  var existingBetsOnGame = selGid ? bets.filter(function(b){
    var bgid = b.isParlay&&b.legs&&b.legs.length>0 ? b.legs[0].gid : b.gameId;
    return b.bettor===bettor && bgid===selGid;
  }) : [];
  var existingBetCount = existingBetsOnGame.length;
  var hasActiveBetOnGame = existingBetCount >= 2;
  var atBetLimit = hasActiveBetOnGame;

  function slipBlock(leg){
    if(hasLeg(leg.id)) return null;
    if(slip.length>=3) return "MAX 3 LEGS";
    if(slip.length>0 && slip[0].gid!==leg.gid) return "SAME GAME ONLY";
    var idx = leg.id.indexOf("_prop_");
    if(idx>=0){
      var after = leg.id.slice(idx+6);
      var u2 = after.indexOf("_", after.indexOf("_")+1);
      var pname = after.slice(0,u2);
      var dup = slip.some(function(l){
        var li = l.id.indexOf("_prop_"); if(li<0) return false;
        var la = l.id.slice(li+6);
        return la.slice(0,la.indexOf("_",la.indexOf("_")+1))===pname && l.id!==leg.id;
      });
      if(dup) return "ONE PROP PER PLAYER";
    }
    return null;
  }
  function toggleLeg(leg){
    if(hasLeg(leg.id)){ setSlip(function(s){return s.filter(function(l){return l.id!==leg.id;})}); return; }
    if(slipBlock(leg)) return;
    setSlip(function(s){return s.concat([leg]);});
  }

  function placeBets(){
    if(!bettor||slip.length===0) return;
    if(atBetLimit||hasActiveBetOnGame) return;
    var slipAmt=FIXED_STAKE;
    if(parseFloat(bals[bettor]||0)<slipAmt) return;
    var gr={};
    ["pi1","sf1","sf2","fin"].forEach(function(gid){ var m=getMatch(gid); if(!m||!m.t1||!m.t2) return; gr[gid]={s1:m.s1,s2:m.s2,final:!!m.w}; });
    var nb=[];
    if(slip.length===1){
      var leg=slip[0];
      var tw=mlPay(leg.ml,slipAmt);
      var b={id:Date.now(),bettor:bettor,game:leg.gLabel||leg.label,gameId:leg.gid,betOptionId:leg.id,pick:leg.label,line:fml(leg.ml),amt:slipAmt,toWin:tw,result:"pending",ts:new Date().toLocaleTimeString()};
      b.result=resolveB(b,gr,pStats); nb.push(b);
    } else {
      var tw2=parlayWin(slip,slipAmt);
      var pb={id:Date.now(),bettor:bettor,game:slip.length+"-LEG PARLAY",gameId:"parlay",betOptionId:"parlay",isParlay:true,legs:slip,pick:slip.map(function(l){return l.label;}).join(" + "),line:parlayOdds(slip),amt:slipAmt,toWin:tw2,result:"pending",ts:new Date().toLocaleTimeString(),gameType:"parlay"};
      pb.result=resolveB(pb,gr,pStats); nb.push(pb);
    }
    setBalsFb(function(prev){
      var cur=parseFloat(prev[bettor]||0);
      var next=Object.assign({},prev);
      next[bettor]=parseFloat((cur-slipAmt).toFixed(2));
      return next;
    });
    setBetsFb(function(p){ return p.concat(nb); });
    setSlip([]); setSlipOpen(false); setShowLedger(true);
  }

  var FIXED_STAKE = 5;

        </div>

  }

  //
  function doLogin(){
    var now = Date.now();
    if(now < _loginLockedUntil){ setLoginErr(true); return; }
    if(!loginName){ setLoginErr(true); return; }
    var pin = loginPin;
    var name = loginName;
    var expected = PINS[name];
    if(!expected){ setLoginErr(true); return; }
    crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin))
      .then(function(buf){
        var hash = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
        if(hash === expected){
          _loginAttempts = 0;
          setLoggedIn(name);
          setLoginErr(false);
          setLoginPin("");
        } else {
          _loginAttempts++;
          if(_loginAttempts >= 5){
            _loginLockedUntil = Date.now() + 30000;
            _loginAttempts = 0;
          }
          setLoginErr(true);
        }
      });
  }

  if(!loggedIn){
    return (
      <div style={{minHeight:"100vh",background:"#07080f",color:"#fff",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>

          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:28,letterSpacing:3}}>RYAN'S <span style={{color:"#FF6B35"}}>INVITATIONAL</span></div>
        </div>

                          {done&&row.match.w===t2.id&&<span style={{fontFamily:MO,fontSize:11,color:t2.color,letterSpacing:1}}>{isFinal?"🏆 CHAMP":"W"}</span>}
                        </div>
                        <span style={{fontFamily:DI,fontSize:32,color:done?(row.match.w===t2.id?t2.color:"rgba(255,255,255,0.35)"):(live&&s2>s1?t2.color:"#fff"),lineHeight:1}}>{s2}</span>
                      </div>
                      {/* Live caption */}
                      {!done&&!live&&<div style={{marginTop:10,fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.2)",letterSpacing:1,textAlign:"center"}}>PENDING</div>}
                      {live&&s1===s2&&s1>=row.cap-1&&<div style={{marginTop:10,fontFamily:MO,fontSize:11,color:"#FFB800",letterSpacing:1,textAlign:"center"}}>OVERTIME</div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}


        {tab===3&&(
          <div style={{padding:"0 0 8px"}}>
            {/* Avatar + name */}
            <div style={{padding:"28px 20px 20px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
              <div style={{width:60,height:60,borderRadius:"50%",background:"rgba(255,107,53,0.15)",border:"2px solid rgba(255,107,53,0.4)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:26,fontFamily:DI,color:"#FF6B35"}}>{loggedIn.slice(0,1)}</div>
              <div style={{fontFamily:DI,fontSize:24,letterSpacing:2,color:"#fff"}}>{loggedIn}</div>
              <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginTop:4}}>LAS VEGAS INVITATIONAL</div>
            </div>

            {/* Balance */}
            <div style={{padding:"20px 20px 16px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,107,53,0.04)"}}>
              <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:3,marginBottom:6}}>BALANCE</div>
              <div style={{fontFamily:DI,fontSize:48,color:"#A8FF78",lineHeight:1}}>${parseFloat(bals[bettor]||0).toFixed(2)}</div>
            </div>

            {/* Betting record */}
            {(function(){
              var myBets=bets.filter(function(b){ return b.bettor===bettor; });
              var totalWagered=myBets.reduce(function(s,b){ return s+b.amt; },0);
              var totalWon=myBets.filter(function(b){ return b.result==="win"; }).reduce(function(s,b){ return s+parseFloat(b.toWin)+b.amt; },0);
              var pending=myBets.filter(function(b){ return b.result==="pending"; }).length;
              var netPL=(totalWon-totalWagered).toFixed(2);
              return (
                <div>
                  <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:3,marginBottom:10}}>YOUR BETTING RECORD</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                      {[
                        {label:"BETS",value:myBets.length,color:"#fff"},
                        {label:"WON",value:myBets.filter(function(b){ return b.result==="win"; }).length,color:"#A8FF78"},
                        {label:"LOST",value:myBets.filter(function(b){ return b.result==="loss"; }).length,color:"#FF8080"},
                        {label:"PENDING",value:pending,color:"#FFB800"},
                      ].map(function(s,i){
                        return <div key={i} style={{textAlign:"center",background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"10px 4px"}}><div style={{fontFamily:DI,fontSize:22,color:s.color,lineHeight:1}}>{s.value}</div><div style={{fontFamily:MO,fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:1,marginTop:3}}>{s.label}</div></div>;
                      })}
                    </div>
                  </div>
                  <div style={{padding:"12px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:2}}>NET P/L</div>
                      <div style={{fontFamily:DI,fontSize:22,color:parseFloat(netPL)>=0?"#A8FF78":"#FF8080"}}>{parseFloat(netPL)>=0?"+":""}{netPL}</div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                      <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:2}}>TOTAL WAGERED</div>
                      <div style={{fontFamily:DI,fontSize:14,color:"rgba(255,255,255,0.5)"}}>${totalWagered}</div>
                    </div>
                  </div>

                  {/* Payout section — per game winnings for Seth to pay out */}
                  {(function(){
                    var wonBets=myBets.filter(function(b){ return b.result==="win"; });
                    if(!wonBets.length) return null;
                    var byGame={};
                    wonBets.forEach(function(b){
                      var gid=b.isParlay&&b.legs&&b.legs.length>0?b.legs[0].gid:b.gameId;
                      var label=b.isParlay?"Prop Parlay":(b.game||gid);
                      var key=gid||"other";
                      if(!byGame[key]) byGame[key]={label:label,collect:0};
                      byGame[key].collect+=parseFloat(b.toWin)+b.amt;
                    });
                    var gameKeys=Object.keys(byGame);
                    var totalCollect=wonBets.reduce(function(s,b){ return s+parseFloat(b.toWin)+b.amt; },0);
                    return (
                      <div style={{padding:"12px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(168,255,120,0.03)"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:"#A8FF78"}}/>
                          <div style={{fontFamily:MO,fontSize:11,color:"#A8FF78",letterSpacing:3}}>WINNINGS TO COLLECT</div>
                        </div>
                        {gameKeys.map(function(key){
                          var g=byGame[key];
                          return (
                            <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                              <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.5)",letterSpacing:1,flex:1,marginRight:8}}>{g.label}</div>
                              <div style={{fontFamily:DI,fontSize:16,color:"#A8FF78"}}>${g.collect.toFixed(2)}</div>
                            </div>
                          );
                        })}
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:10,marginTop:4}}>
                          <div style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:"#A8FF78"}}>TOTAL COLLECT</div>
                          <div style={{fontFamily:DI,fontSize:22,color:"#A8FF78"}}>${totalCollect.toFixed(2)}</div>
                        </div>
                        <div style={{fontFamily:MO,fontSize:11,color:"rgba(168,255,120,0.4)",marginTop:4,letterSpacing:1}}>Includes original stake + winnings</div>
                      </div>
                    );
                  })()}
                </div>
              );
            })()}

          </div>
        )}

        {tab===4&&isSeth&&(
          <div style={{padding:"14px 12px"}}>

            {/* Header */}
            <div style={{padding:"4px 2px 14px"}}>
              <div style={{fontFamily:DI,fontSize:20,letterSpacing:2,color:"#A78BFA"}}>ADMIN</div>
              <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginTop:2}}>SETH ONLY</div>
            </div>

            {/* Team Draw */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12,overflow:"hidden",marginBottom:14}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(167,139,250,0.06)",display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"#A78BFA"}}/>
                <span style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:"#A78BFA"}}>TEAM DRAW</span>
              </div>
              <div style={{padding:"14px"}}>
                {draw&&draw.s3&&(
                  <div style={{marginBottom:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[
                      {label:"PLAY-IN",teams:[draw.pi1t1,draw.pi1t2],color:"#FF6B35"},
                      {label:"BYE SEED 1",teams:[draw.s1],color:"#A78BFA"},
                      {label:"BYE SEED 2",teams:[draw.s2],color:"#34D399"},
                      {label:"BYE SEED 3",teams:[draw.s3],color:"#FBBF24"},
                    ].map(function(row,i){
                      return (
                        <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"10px 12px"}}>
                          <div style={{fontFamily:MO,fontSize:11,color:row.color,letterSpacing:1,marginBottom:6}}>{row.label}</div>
                          {row.teams.filter(Boolean).map(function(tid){ var t=getTeam(tid); if(!t) return null; return <div key={tid} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><div style={{width:6,height:6,borderRadius:"50%",background:t.color,flexShrink:0}}/><span style={{fontFamily:DI,fontSize:12,color:"#fff",letterSpacing:1}}>{t.label}</span></div>; })}
                        </div>
                      );
                    })}
                  </div>
                )}
                {!draw&&<div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:12,lineHeight:1.6,textAlign:"center"}}>Randomly assigns all 5 teams. 2 teams play the Play-In, 3 teams get byes into the bracket.</div>}
                <button onClick={doDraw} style={{width:"100%",padding:"13px",borderRadius:8,cursor:"pointer",background:"rgba(167,139,250,0.2)",border:"1px solid rgba(167,139,250,0.4)",fontFamily:DI,fontSize:14,letterSpacing:2,color:"#A78BFA"}}>
                  {draw?"RE-DRAW TEAMS":"DRAW TEAMS"}
                </button>
              </div>
            </div>

            {/* Update Balance */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12,overflow:"hidden",marginBottom:14}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(167,139,250,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:"#A78BFA"}}/>
                  <span style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:"#A78BFA"}}>MANAGE BALANCES</span>
                </div>
                {depPlayers.length>0&&(
                  <span style={{fontFamily:MO,fontSize:11,color:"#A78BFA"}}>{depPlayers.length} selected</span>
                )}
              </div>
              <div style={{padding:"14px"}}>
                {/* Player chip grid */}
                <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.25)",letterSpacing:1,marginBottom:8}}>SELECT PLAYERS</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                  {ALL_PLAYERS.map(function(p){
                    var sel = depPlayers.indexOf(p)>=0;
                    var bal = parseFloat(bals[p]||0).toFixed(2);
                    return (
                      <button key={p} onClick={function(){
                        setDepPlayers(function(prev){
                          return sel ? prev.filter(function(x){ return x!==p; }) : prev.concat([p]);
                        });
                        setDepMsg(null);
                      }} style={{padding:"7px 10px",borderRadius:8,cursor:"pointer",border:"none",
                        background:sel?"rgba(167,139,250,0.25)":"rgba(255,255,255,0.06)",
                        outline:sel?"1.5px solid #A78BFA":"1.5px solid transparent",
                        display:"flex",flexDirection:"column",alignItems:"center",gap:1,transition:"all 0.12s"}}>
                        <span style={{fontFamily:DI,fontSize:12,letterSpacing:1,color:sel?"#A78BFA":"#fff"}}>{p}</span>
                        <span style={{fontFamily:MO,fontSize:10,color:sel?"rgba(167,139,250,0.7)":"rgba(255,255,255,0.3)"}}>${bal}</span>
                      </button>
                    );
                  })}
                </div>
                {/* Select all / clear */}
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  <button onClick={function(){ setDepPlayers(ALL_PLAYERS.slice()); setDepMsg(null); }}
                    style={{flex:1,padding:"7px",borderRadius:6,cursor:"pointer",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.4)"}}>
                    SELECT ALL
                  </button>
                  <button onClick={function(){ setDepPlayers([]); setDepMsg(null); }}
                    style={{flex:1,padding:"7px",borderRadius:6,cursor:"pointer",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.4)"}}>
                    CLEAR
                  </button>
                </div>
                {depMsg&&<div style={{marginBottom:10,padding:"7px 10px",borderRadius:6,background:depMsg.err?"rgba(255,80,80,0.1)":"rgba(168,255,120,0.1)",border:"1px solid "+(depMsg.err?"rgba(255,80,80,0.3)":"rgba(168,255,120,0.3)"),fontFamily:MO,fontSize:11,color:depMsg.err?"#FF8080":"#A8FF78"}}>{depMsg.txt}</div>}
                {/* Add funds buttons */}
                <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.25)",letterSpacing:1,marginBottom:6}}>ADD FUNDS</div>
                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  {[5,10,20].map(function(amt){
                    return (
                      <button key={amt} onClick={function(){
                        if(!depPlayers.length){ setDepMsg({err:true,txt:"Select at least one player."}); return; }
                        setBalsFb(function(prev){
                          var next=Object.assign({},prev);
                          depPlayers.forEach(function(p){
                            next[p]=parseFloat((parseFloat(prev[p]||0)+amt).toFixed(2));
                          });
                          return next;
                        });
                        setDepMsg({err:false,txt:"+$"+amt+" added to "+depPlayers.join(", ")+"."});
                      }} style={{flex:1,padding:"12px 4px",borderRadius:8,cursor:"pointer",background:"rgba(167,139,250,0.15)",border:"1px solid rgba(167,139,250,0.3)",fontFamily:DI,fontSize:16,letterSpacing:1,color:"#A78BFA"}}>
                        +${amt}
                      </button>
                    );
                  })}
                </div>
                <button onClick={function(){
                  if(!depPlayers.length){ setDepMsg({err:true,txt:"Select at least one player."}); return; }
                  setBalsFb(function(prev){
                    var next=Object.assign({},prev);
                    depPlayers.forEach(function(p){ next[p]=0; });
                    return next;
                  });
                  setDepMsg({err:false,txt:"Reset "+depPlayers.join(", ")+" to $0."});
                }} style={{width:"100%",padding:"11px",borderRadius:8,cursor:"pointer",background:"rgba(255,80,80,0.1)",border:"1px solid rgba(255,80,80,0.25)",fontFamily:DI,fontSize:13,letterSpacing:2,color:"rgba(255,120,120,0.8)"}}>
                  RESET TO $0
                </button>
              </div>
            </div>

            {/* Settle Winnings */}
            {(function(){
              var playerWinnings=ALL_PLAYERS.map(function(p){
                var wonBets=bets.filter(function(b){ return b.bettor===p&&b.result==="win"; });
                var total=wonBets.reduce(function(s,b){ return s+parseFloat(b.toWin)+b.amt; },0);
                return {name:p,total:total,count:wonBets.length};
              }).filter(function(p){ return p.total>0; }).sort(function(a,b){ return b.total-a.total; });
              var grandTotal=playerWinnings.reduce(function(s,p){ return s+p.total; },0);
              var unsettledTotal=playerWinnings.filter(function(p){ return !settled[p.name]; }).reduce(function(s,p){ return s+p.total; },0);
              return (
                <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(168,255,120,0.2)",borderRadius:12,overflow:"hidden"}}>
                  <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(168,255,120,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:"#A8FF78"}}/>
                      <span style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:"#A8FF78"}}>SETTLE WINNINGS</span>
                    </div>
                    {playerWinnings.length>0&&<span style={{fontFamily:MO,fontSize:11,color:"rgba(168,255,120,0.5)"}}>{playerWinnings.filter(function(p){ return settled[p.name]; }).length}/{playerWinnings.length} paid</span>}
                  </div>
                  {!playerWinnings.length?(
                    <div style={{padding:"24px 14px",textAlign:"center",fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.25)",letterSpacing:1}}>No winning bets yet.</div>
                  ):(
                    <div>
                      {playerWinnings.map(function(p,i){
                        var isSettled=!!settled[p.name];
                        return (
                          <div key={p.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderBottom:i<playerWinnings.length-1?"1px solid rgba(255,255,255,0.05)":"none",opacity:isSettled?0.45:1,transition:"opacity 0.2s"}}>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <div style={{fontFamily:DI,fontSize:14,letterSpacing:1,color:isSettled?"rgba(255,255,255,0.4)":"#fff"}}>{p.name}</div>
                                {isSettled&&<span style={{fontFamily:MO,fontSize:10,color:"#A8FF78",background:"rgba(168,255,120,0.1)",border:"1px solid rgba(168,255,120,0.25)",borderRadius:4,padding:"1px 6px",letterSpacing:1}}>PAID</span>}
                              </div>
                              <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>{p.count} winning bet{p.count!==1?"s":""}</div>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{fontFamily:DI,fontSize:22,color:isSettled?"rgba(168,255,120,0.4)":"#A8FF78"}}>${p.total.toFixed(2)}</div>
                              <button onClick={function(){
                                setSettledFb(function(prev){
                                  var next=Object.assign({},prev);
                                  if(next[p.name]) delete next[p.name];
                                  else next[p.name]=true;
                                  return next;
                                });
                              }} style={{padding:"6px 10px",borderRadius:6,cursor:"pointer",border:"none",
                                background:isSettled?"rgba(168,255,120,0.1)":"rgba(255,255,255,0.08)",
                                fontFamily:MO,fontSize:10,letterSpacing:1,
                                color:isSettled?"#A8FF78":"rgba(255,255,255,0.4)"}}>
                                {isSettled?"✓ PAID":"MARK PAID"}
                              </button>
                            </div>
                          </div>
                        );
                      })}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"rgba(168,255,120,0.06)",borderTop:"1px solid rgba(168,255,120,0.2)"}}>
                        <div>
                          <div style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:"#A8FF78"}}>STILL OWED</div>
                          <div style={{fontFamily:MO,fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>Total: ${grandTotal.toFixed(2)}</div>
                        </div>
                        <div style={{fontFamily:DI,fontSize:24,color:"#A8FF78"}}>${unsettledTotal.toFixed(2)}</div>
                      </div>
                      <div style={{padding:"8px 14px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                        <div style={{fontFamily:MO,fontSize:11,color:"rgba(168,255,120,0.4)",letterSpacing:1}}>Includes original stake + winnings</div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

          </div>
        )}

      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:20px;font-family:monospace;color:#FF8080;font-size:11px"><b style="color:#FF6B35">ERROR:</b><br>' + e.message + '<br><br>' + (e.stack||'').slice(0,500) + '</div>';
}
</script>

</body>
</html>
